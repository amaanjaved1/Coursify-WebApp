<!-- Coursify -->
<div
  style="
    padding: 18px 32px;
    background-color: #00305f;
    color: #ffffff;
    font-size: 18px;
    font-weight: bold;
  "
>
  <span style="color: #ffffff; font-weight: bold;">Cours</span
  ><span style="color: #d62839; font-weight: bold;">ify</span>
</div>

<!-- Body -->
<div style="padding: 36px 32px 28px; background-color: #ffffff; color: #000000;">
  <h2 style="color: #00305f; margin: 0 0 8px; font-size: 22px; font-weight: bold;">
    Verify Your Email
  </h2>
  <p style="line-height: 1.6; color: #6b7280; font-size: 14px; margin: 0 0 20px;">
    Thanks for signing up for Coursify, the course platform for Queen's University students.
  </p>
  <p style="line-height: 1.6; color: #333333; font-size: 14px; margin: 0 0 28px;">
    Click the button below to confirm your email address and get started:
  </p>

  <!-- Button -->
  <div style="text-align: center; margin: 0 0 28px;">
    <a
      href="{{ .ConfirmationURL }}"
      style="
        background-color: #d62839;
        color: #ffffff;
        text-decoration: none;
        padding: 14px 36px;
        border-radius: 12px;
        display: inline-block;
        font-weight: bold;
        font-size: 14px;
        letter-spacing: 0.2px;
      "
    >
      Confirm My Email
    </a>
  </div>

  <p style="line-height: 1.6; color: #9ca3af; font-size: 13px; margin: 0;">
    If you did not sign up for Coursify, you can safely ignore this email.
  </p>
</div>

<!-- Footer -->
<div
  style="
    border-top: 1px solid #f0f0f0;
    padding: 18px 32px;
    text-align: center;
    font-size: 12px;
    color: #9ca3af;
    background-color: #fafafa;
  "
>
  <p style="margin: 0;">
    &copy; 2026 <span style="color: #00305f; font-weight: bold;">Cours</span
    ><span style="color: #d62839; font-weight: bold;">ify</span>
  </p>
</div>
